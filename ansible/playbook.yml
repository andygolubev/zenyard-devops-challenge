---
- name: Bootstrap and deploy zenyard on GCP VM
  hosts: gcp
  gather_facts: true

  roles:
    - role: common
      tags: [common, bootstrap]

    - role: k3s
      tags: [k3s, bootstrap]

    - role: helm
      tags: [helm, bootstrap]

    - role: image
      tags: [image]

    - role: sealed-secrets
      tags: [sealed-secrets, deploy]

    - role: deploy
      tags: [deploy]

    - role: verify
      tags: [verify]
