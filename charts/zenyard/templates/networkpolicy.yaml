{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "zenyard.fullname" . }}-api-egress
  labels:
    {{- include "zenyard.labels" . | nindent 4 }}
    app.kubernetes.io/component: network
spec:
  podSelector:
    matchLabels:
      {{- include "zenyard.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "zenyard.fullname" . }}-postgres-ingress
  labels:
    {{- include "zenyard.labels" . | nindent 4 }}
    app.kubernetes.io/component: network
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgresql
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "zenyard.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5432
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 9187
{{- end }}
