apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "zenyard.fullname" . }}-postgres-init
  labels:
    {{- include "zenyard.labels" . | nindent 4 }}
    app.kubernetes.io/component: schema
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        {{- include "zenyard.labels" . | nindent 8 }}
        app.kubernetes.io/component: schema
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: schema
          image: postgres:17.2-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: PGHOST
              value: {{ .Values.database.host | quote }}
            - name: PGPORT
              value: {{ .Values.database.port | quote }}
            - name: PGDATABASE
              value: {{ .Values.database.name | quote }}
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: {{ include "zenyard.dbSecretName" . }}
                  key: {{ .Values.database.secretKeys.username }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "zenyard.dbSecretName" . }}
                  key: {{ .Values.database.secretKeys.password }}
          command:
            - /bin/sh
            - -ec
            - |
              until pg_isready; do
                sleep 2
              done
              psql -v ON_ERROR_STOP=1 <<'SQL'
              CREATE TABLE IF NOT EXISTS todos (
                id BIGSERIAL PRIMARY KEY,
                title TEXT NOT NULL CHECK (length(title) > 0),
                completed BOOLEAN NOT NULL DEFAULT FALSE,
                created_at TIMESTAMPTZ NOT NULL DEFAULT now(),
                completed_at TIMESTAMPTZ
              );
              SQL
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
